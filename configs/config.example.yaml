# 统一配置入口：log-monitor 与 dashboard(lvneng) 各自只读取属于自己的分节。
# 两个服务的 main.go 通过 CONFIG_PATH 环境变量指向本文件（默认按相对路径自动探测）。
#
# 安全约定：本文件不包含任何密码/密钥。Elasticsearch 密码、JWT 签名密钥、管理员密码哈希
# 均通过环境变量注入（见 configs/.env.example），避免真实凭据进入版本库。

log_monitor:
  server:
    port: 8080
  elasticsearch:
    address: "https://your-es-host:9200"
    username: "elastic"
    # password 不在此配置：通过环境变量 ES_PASSWORD 注入，见 .env.example
    index: "k8s-logs-*"
    interval: 10
    query:
      size: 100
      sort:
        - "@timestamp":
            order: desc
      query:
        bool:
          filter:
            - range:
                "@timestamp":
                  gte: "now-{interval}s"
                  lte: "now"
  feishu_webhook:
    url: ""
    max_retries: 3
  alerts: []

dashboard:
  listen_addr: ":8081"
  probe_interval: "15s"

auth:
  # 管理员账号名，默认 admin；密码哈希（bcrypt）与 JWT 签名密钥均通过环境变量注入：
  # ADMIN_USER / ADMIN_PASSWORD_HASH / AUTH_JWT_SECRET，见 .env.example
  admin_user: "admin"
